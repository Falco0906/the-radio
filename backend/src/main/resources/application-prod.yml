spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/theradio
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  
  spotify:
    api-base-url: https://api.spotify.com/v1
    polling-interval-seconds: 5

logging:
  level:
    com.theradio: INFO
    org.springframework: WARN

