spring:
  application:
    name: the-radio
  
  datasource:
    url: jdbc:postgresql://localhost:5432/theradio
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  security:
    oauth2:
      client:
        registration:
          spotify:
            client-id: ${SPOTIFY_CLIENT_ID:dummy}
            client-secret: ${SPOTIFY_CLIENT_SECRET:dummy}
            scope: user-read-currently-playing,user-read-playback-state
            authorization-grant-type: authorization_code
            redirect-uri: ${SPOTIFY_REDIRECT_URI:http://localhost:8081/api/platforms/spotify/callback}
        provider:
          spotify:
            authorization-uri: https://accounts.spotify.com/authorize
            token-uri: https://accounts.spotify.com/api/token
            user-info-uri: https://api.spotify.com/v1/me

server:
  port: 8081
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
    expiration: 86400000 # 24 hours in milliseconds
  
  spotify:
    api-base-url: https://api.spotify.com/v1
    polling-interval-seconds: 5

logging:
  level:
    com.theradio: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

